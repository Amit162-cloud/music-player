{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundFlow</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mediaelement/4.2.7/mediaelementplayer.min.css" rel="stylesheet"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0d0d0d;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 600;
            color: #1ed760;
        }

        .header i {
            font-size: 20px;
        }

        .main-container {
            display: flex;
            gap: 30px;
            padding: 20px 30px;
            max-width: 1400px;
            margin: 0 auto;
            height: calc(100vh - 60px);
        }

        .player-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            width: 420px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .album-art {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .song-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .song-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .song-artist {
            font-size: 14px;
            color: #b3b3b3;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #b3b3b3;
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: #404040;
            border-radius: 3px;
            margin-bottom: 20px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: #1ed760;
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-btn {
            background: none;
            border: none;
            color: #b3b3b3;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 8px;
        }

        .control-btn:hover {
            color: #fff;
            transform: scale(1.1);
        }

        .play-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #1ed760;
            color: #000;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn:hover {
            background: #1fdf64;
            transform: scale(1.05);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-icon {
            color: #b3b3b3;
            font-size: 16px;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            background: #404040;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .volume-fill {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 70%;
        }

        .playlist-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .playlist-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .playlist-header i {
            color: #1ed760;
        }

        .playlist-items {
            overflow-y: auto;
            flex: 1;
        }

        .playlist-items::-webkit-scrollbar {
            width: 8px;
        }

        .playlist-items::-webkit-scrollbar-track {
            background: transparent;
        }

        .playlist-items::-webkit-scrollbar-thumb {
            background: #404040;
            border-radius: 4px;
        }

        .playlist-items::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 6px;
        }

        .playlist-item:hover {
            background: #282828;
        }

        .playlist-item.active {
            background: #282828;
        }

        .playlist-thumb {
            width: 45px;
            height: 45px;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .playlist-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .playlist-info {
            flex: 1;
            min-width: 0;
        }

        .playlist-song-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-song-artist {
            font-size: 12px;
            color: #b3b3b3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-duration {
            font-size: 12px;
            color: #b3b3b3;
            flex-shrink: 0;
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-headphones"></i>
        SoundFlow
    </div>

    {% include 'main.html' %}

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        $(document).ready(function() {
            const audio = $('#audio-player')[0];
            const playBtn = $('.play-btn');
            const progressBar = $('.progress-bar');
            const progressFill = $('.progress-fill');
            const currentTimeEl = $('.current-time');
            const durationEl = $('.duration');
            let currentSongIndex = 0;
            const playlist = [];

            // Build playlist array
            $('.playlist-item').each(function(index) {
                playlist.push({
                    id: $(this).data('song-id'),
                    title: $(this).data('title'),
                    artist: $(this).data('artist'),
                    image: $(this).data('image'),
                    audio: $(this).data('audio'),
                    duration: $(this).data('duration'),
                    element: $(this)
                });
                
                if ($(this).hasClass('active')) {
                    currentSongIndex = index;
                }
            });

            // Play/Pause
            playBtn.click(function() {
                if (audio.paused) {
                    audio.play();
                    $(this).html('<i class="fas fa-pause"></i>');
                } else {
                    audio.pause();
                    $(this).html('<i class="fas fa-play"></i>');
                }
            });

            // Update progress
            audio.addEventListener('timeupdate', function() {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.css('width', percent + '%');
                currentTimeEl.text(formatTime(audio.currentTime));
            });

            // Set duration
            audio.addEventListener('loadedmetadata', function() {
                durationEl.text(formatTime(audio.duration));
            });

            // Seek
            progressBar.click(function(e) {
                const percent = e.offsetX / $(this).width();
                audio.currentTime = percent * audio.duration;
            });

            // Click on playlist item
            $('.playlist-item').click(function() {
                const index = $('.playlist-item').index(this);
                loadSong(index);
                audio.play();
                playBtn.html('<i class="fas fa-pause"></i>');
            });

            // Previous button
            $('.prev-btn').click(function() {
                currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
                loadSong(currentSongIndex);
                audio.play();
                playBtn.html('<i class="fas fa-pause"></i>');
            });

            // Next button
            $('.next-btn').click(function() {
                currentSongIndex = (currentSongIndex + 1) % playlist.length;
                loadSong(currentSongIndex);
                audio.play();
                playBtn.html('<i class="fas fa-pause"></i>');
            });

            // Auto play next song when current ends
            audio.addEventListener('ended', function() {
                currentSongIndex = (currentSongIndex + 1) % playlist.length;
                loadSong(currentSongIndex);
                audio.play();
            });

            function loadSong(index) {
                const song = playlist[index];
                currentSongIndex = index;
                
                // Update player
                $('#current-album-art').attr('src', song.image);
                $('#current-title').text(song.title);
                $('#current-artist').text(song.artist);
                audio.src = song.audio;
                durationEl.text(song.duration);
                
                // Update active state in playlist
                $('.playlist-item').removeClass('active');
                song.element.addClass('active');
                
                // Reset progress
                progressFill.css('width', '0%');
                currentTimeEl.text('0:00');
            }

            function formatTime(seconds) {
                if (isNaN(seconds)) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return mins + ':' + (secs < 10 ? '0' : '') + secs;
            }
        });
    </script>
</body>
</html>
