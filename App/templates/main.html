{% for item in page_obj %}
<div class="main-container">
    <div class="player-card">
        <div class="album-art">
            <img src="{{item.image.url}}" alt="{{item.title}}" id="current-album-art">
        </div>
        
        <div class="song-info">
            <div class="song-title" id="current-title">{{item.title}}</div>
            <div class="song-artist" id="current-artist">{{item.artist}}</div>
        </div>
        
        <div class="time-info">
            <span class="current-time">0:00</span>
            <span class="duration">{{item.duration}}</span>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <div class="controls">
            <button class="control-btn prev-btn">
                <i class="fas fa-step-backward"></i>
            </button>
            <button class="control-btn play-btn">
                <i class="fas fa-play"></i>
            </button>
            <button class="control-btn next-btn">
                <i class="fas fa-step-forward"></i>
            </button>
        </div>
        
        <div class="volume-control">
            <i class="fas fa-volume-up volume-icon"></i>
            <div class="volume-slider">
                <div class="volume-fill"></div>
            </div>
        </div>
        
        <audio id="audio-player">
            <source src="{% if item.audio_file %}{{item.audio_file.url}}{% else %}{{item.audio_link}}{% endif %}" type="audio/mp3">
        </audio>
    </div>
    
    <div class="playlist-card">
        <div class="playlist-header">
            <i class="fas fa-music"></i>
            Playlist
        </div>
        
        <div class="playlist-items">
            {% for song in page_obj.paginator.object_list %}
            <div class="playlist-item {% if song.id == item.id %}active{% endif %}" 
                 data-song-id="{{song.id}}"
                 data-title="{{song.title}}"
                 data-artist="{{song.artist}}"
                 data-image="{{song.image.url}}"
                 data-audio="{% if song.audio_file %}{{song.audio_file.url}}{% else %}{{song.audio_link}}{% endif %}"
                 data-duration="{{song.duration}}">
                <div class="playlist-thumb">
                    <img src="{{song.image.url}}" alt="{{song.title}}">
                </div>
                <div class="playlist-info">
                    <div class="playlist-song-title">{{song.title}}</div>
                    <div class="playlist-song-artist">{{song.artist}}</div>
                </div>
                <div class="playlist-duration">{{song.duration}}</div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endfor %}
